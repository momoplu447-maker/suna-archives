<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Archives de Suna</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c8973a;--gold-bright:#f0c060;--gold-dim:#7a5a18;
  --sand-pale:#f5e4b0;--blood:#8b1c1c;--blood-b:#c02828;
  --deep:#1a1208;--dark:#2d1f0a;--ink:#1a1208;
}
body{background:#0d0a05;color:var(--sand-pale);font-family:'Noto Serif JP',serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(8,5,0,.6) 100%);pointer-events:none;z-index:0}

.wrapper{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* Header */
.ah{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(200,151,58,.18)}
.ah-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.45em;color:var(--blood-b);display:flex;align-items:center;justify-content:center;gap:.8rem;margin-bottom:.5rem}
.ah-tag::before,.ah-tag::after{content:'';width:40px;height:1px;background:rgba(192,40,40,.4)}
.ah-title{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--gold-bright);letter-spacing:.07em;text-shadow:0 0 25px rgba(240,192,96,.25)}
.ah-sub{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.28em;color:var(--gold-dim);margin-top:.2rem}

/* Status bar */
.status-bar{background:rgba(45,31,10,.5);border:1px solid rgba(200,151,58,.15);padding:.6rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#2a5a18;box-shadow:0 0 6px #2a5a18;animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.7}50%{opacity:1}}
.status-dot.err{background:var(--blood-b);box-shadow:0 0 6px var(--blood-b);animation:none}
.status-text{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.18em;color:var(--gold-dim)}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 340px;gap:1.8rem;align-items:start}

/* Panels */
.panel{background:rgba(45,31,10,.45);border:1px solid rgba(200,151,58,.2);padding:1.6rem;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent)}
.panel-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.3em;color:var(--gold-dim);margin-bottom:1.4rem;text-transform:uppercase;display:flex;align-items:center;gap:.7rem}
.panel-title::after{content:'';flex:1;height:1px;background:rgba(200,151,58,.22)}

/* Image upload */
.img-section{margin-bottom:1.5rem;padding:1.1rem;background:rgba(13,10,5,.4);border:1px solid rgba(200,151,58,.15)}
.img-upload-area{border:1px dashed rgba(200,151,58,.35);padding:1.1rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.img-upload-area:hover{background:rgba(200,151,58,.04);border-color:var(--gold)}
.img-upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;padding:0;border:none;background:none}
.upload-txt{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;color:var(--gold-dim)}
.preview-oval{width:90px;height:116px;border-radius:50%/52%;border:1px solid var(--gold-dim);overflow:hidden;margin:.7rem auto 0;display:none}
.preview-oval img{width:100%;height:100%;object-fit:cover;object-position:top}
.btn-sm{background:none;border:1px solid rgba(200,151,58,.32);color:var(--gold-dim);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;padding:.38rem .9rem;cursor:pointer;transition:all .2s;margin-top:.7rem}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,151,58,.06)}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.fg{display:flex;flex-direction:column;gap:.38rem;margin-bottom:1rem}
.fg.full{grid-column:1/-1}
label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;color:var(--gold-dim);text-transform:uppercase}
input,select,textarea{background:rgba(13,10,5,.6);border:1px solid rgba(200,151,58,.25);color:var(--sand-pale);font-family:'Noto Serif JP',serif;font-size:.84rem;padding:.55rem .75rem;outline:none;transition:border-color .2s;width:100%;-webkit-appearance:none;border-radius:0}
input:focus,select:focus,textarea:focus{border-color:var(--gold-dim);background:rgba(13,10,5,.8)}
input::placeholder,textarea::placeholder{color:rgba(245,228,176,.18);font-style:italic}
select option{background:#2d1f0a;color:var(--sand-pale)}
textarea{resize:vertical;min-height:175px;line-height:1.75}

.btn-submit{width:100%;padding:.85rem;background:linear-gradient(135deg,#5a0c0c,var(--blood-b));border:1px solid rgba(139,26,26,.5);color:var(--sand-pale);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:.4rem;position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0,transparent 60%)}
.btn-submit:hover{background:linear-gradient(135deg,var(--blood-b),#a82020);transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,26,26,.38)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Toast */
.toast{display:none;padding:.6rem .9rem;font-family:'Cinzel',serif;font-size:.65rem;margin-top:.7rem;text-align:center;letter-spacing:.12em}
.toast.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toast.ok{background:linear-gradient(135deg,#1a3d1a,#2a5a2a);border:1px solid rgba(60,140,60,.35);color:#a0e0a0}
.toast.err{background:linear-gradient(135deg,#3d1a1a,#5a2a2a);border:1px solid rgba(140,60,60,.35);color:#e0a0a0}

/* Liste admin */
.report-item{border-bottom:1px solid rgba(200,151,58,.12);padding:.85rem 0;display:flex;align-items:flex-start;gap:.75rem;animation:fadeIn .3s ease}
.report-item:last-child{border-bottom:none}
.ri-num{font-family:'Cinzel Decorative',serif;font-size:.82rem;color:var(--blood-b);min-width:2rem;line-height:1.2}
.ri-info{flex:1}
.ri-title{font-family:'Cinzel',serif;font-size:.76rem;color:var(--sand-pale);margin-bottom:.14rem}
.ri-meta{font-size:.6rem;color:var(--gold-dim);letter-spacing:.07em;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.rank-pill{font-family:'Cinzel',serif;font-size:.52rem;padding:.1rem .38rem;border:1px solid}
.rp-s{border-color:var(--blood-b);color:var(--blood-b)}.rp-a{border-color:var(--gold);color:var(--gold)}
.rp-b{border-color:#6ab04c;color:#6ab04c}.rp-c{border-color:#4a9ec4;color:#4a9ec4}
.rp-d{border-color:rgba(245,228,176,.28);color:rgba(245,228,176,.28)}
.del-btn{background:none;border:none;color:rgba(139,26,26,.45);cursor:pointer;font-size:.95rem;line-height:1;padding:.2rem;transition:color .2s;flex-shrink:0}
.del-btn:hover{color:var(--blood-b)}
.empty-list{text-align:center;padding:2rem 0;color:var(--gold-dim);font-size:.65rem;letter-spacing:.2em;font-family:'Cinzel',serif;opacity:.5}
.loading{text-align:center;padding:1.5rem;color:var(--gold-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;opacity:.6}

.link-home{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.4rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;color:var(--gold-dim);text-decoration:none;border:1px solid rgba(200,151,58,.25);padding:.4rem 1rem;transition:all .2s}
.link-home:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,151,58,.06)}

@media(max-width:680px){.grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrapper">

  <div class="ah">
    <div class="ah-tag">Accès Restreint · Administrateur</div>
    <div class="ah-title">Archives de Suna</div>
    <div class="ah-sub">Panneau de Gestion · Ousen Zafura</div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Connexion à la base de données…</span>
  </div>

  <!-- Image personnage -->
  <div class="panel" style="margin-bottom:1.5rem">
    <div class="panel-title">Image du Personnage</div>
    <div class="img-section">
      <div class="img-upload-area" id="uploadArea">
        <input type="file" accept="image/*" id="imgInput" onchange="previewImg(event)"/>
        <div class="upload-txt" id="uploadTxt">Cliquer pour charger l'image du personnage</div>
      </div>
      <div class="preview-oval" id="previewOval"><img id="previewImg" src="" alt="Aperçu"/></div>
      <div style="text-align:center">
        <button class="btn-sm" onclick="saveImage()">Enregistrer l'image</button>
      </div>
      <div class="toast" id="imgToast"></div>
    </div>
  </div>

  <div class="grid">
    <!-- Formulaire -->
    <div class="panel">
      <div class="panel-title">Nouveau Rapport</div>
      <div class="form-row">
        <div class="fg">
          <label>Numéro</label>
          <input type="text" id="f_number" placeholder="Auto"/>
        </div>
        <div class="fg">
          <label>Rang</label>
          <select id="f_rank">
            <option value="S">Rang S</option>
            <option value="A">Rang A</option>
            <option value="B" selected>Rang B</option>
            <option value="C">Rang C</option>
            <option value="D">Rang D</option>
          </select>
        </div>
      </div>
      <div class="fg full">
        <label>Titre de la mission</label>
        <input type="text" id="f_title" placeholder="Ex : Escorte du Kazekage…"/>
      </div>
      <div class="form-row">
        <div class="fg">
          <label>Date</label>
          <input type="text" id="f_date" placeholder="An 15 · 3ème mois"/>
        </div>
        <div class="fg">
          <label>Durée</label>
          <input type="text" id="f_duration" placeholder="3 jours"/>
        </div>
      </div>
      <div class="form-row">
        <div class="fg">
          <label>Lieu</label>
          <input type="text" id="f_lieu" placeholder="Désert de Suna…"/>
        </div>
        <div class="fg">
          <label>Statut</label>
          <select id="f_statut">
            <option value="Succès">Succès</option>
            <option value="Échec">Échec</option>
            <option value="Partiel">Partiel</option>
            <option value="Annulé">Annulé</option>
          </select>
        </div>
      </div>
      <div class="fg full">
        <label>Corps du rapport</label>
        <textarea id="f_body" placeholder="Rédiger le rapport complet…"></textarea>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitReport()">⟡ Enregistrer le Rapport ⟡</button>
      <div class="toast" id="formToast"></div>
    </div>

    <!-- Liste -->
    <div class="panel">
      <div class="panel-title">Rapports Enregistrés</div>
      <div id="adminList"><div class="loading">Chargement…</div></div>
    </div>
  </div>

  <a href="/" class="link-home">
    <svg width="12" height="9" viewBox="0 0 12 9" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4.5H1M5 1L1 4.5l4 3.5"/></svg>
    Voir le site public
  </a>
</div>

<script>
const API = '';

/* ── STATUS ── */
async function checkStatus() {
  try {
    const r = await fetch(`${API}/api/info`);
    const d = await r.json();
    document.getElementById('statusDot').classList.remove('err');
    document.getElementById('statusText').textContent =
      `Base connectée · ${d.reports_count} rapport${d.reports_count>1?'s':''} enregistré${d.reports_count>1?'s':''}`;
  } catch(e) {
    document.getElementById('statusDot').classList.add('err');
    document.getElementById('statusText').textContent = 'Erreur : serveur inaccessible';
  }
}

/* ── IMAGE ── */
let _imgFile = null;

function previewImg(e) {
  _imgFile = e.target.files[0];
  if (!_imgFile) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewOval').style.display = 'block';
    document.getElementById('uploadTxt').textContent = _imgFile.name;
  };
  reader.readAsDataURL(_imgFile);
}

async function saveImage() {
  if (!_imgFile) { showToast('imgToast', 'Aucune image sélectionnée.', false); return; }
  const fd = new FormData();
  fd.append('file', _imgFile);
  try {
    const r = await fetch(`${API}/api/char-image`, { method:'POST', body:fd });
    if (!r.ok) throw new Error();
    showToast('imgToast', '✓ Image enregistrée.', true);
  } catch(e) {
    showToast('imgToast', 'Erreur lors de l\'enregistrement.', false);
  }
}

async function loadCurrentImage() {
  try {
    const r = await fetch(`${API}/api/char-image`);
    const d = await r.json();
    if (d.image_url) {
      document.getElementById('previewImg').src = d.image_url;
      document.getElementById('previewOval').style.display = 'block';
      document.getElementById('uploadTxt').textContent = 'Image actuelle chargée';
    }
  } catch(e) {}
}

/* ── RAPPORTS ── */
async function loadReports() {
  try {
    const r = await fetch(`${API}/api/reports`);
    const reports = await r.json();
    renderList(reports);
  } catch(e) {
    document.getElementById('adminList').innerHTML = '<div class="empty-list">Erreur de connexion</div>';
  }
}

const rankPillC = { S:'rp-s', A:'rp-a', B:'rp-b', C:'rp-c', D:'rp-d' };

function renderList(reports) {
  const el = document.getElementById('adminList');
  if (!reports.length) {
    el.innerHTML = '<div class="empty-list">Aucun rapport</div>';
    return;
  }
  el.innerHTML = [...reports].reverse().map(r => `
    <div class="report-item" id="ri-${r.id}">
      <div class="ri-num">${r.number}</div>
      <div class="ri-info">
        <div class="ri-title">${r.title}</div>
        <div class="ri-meta">
          <span class="rank-pill ${rankPillC[r.rank]||'rp-d'}">Rang ${r.rank}</span>
          <span>${r.date_mission||'—'}</span>
          <span>${r.statut||''}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteReport(${r.id})" title="Supprimer">✕</button>
    </div>
  `).join('');
}

async function submitReport() {
  const title = document.getElementById('f_title').value.trim();
  const body  = document.getElementById('f_body').value.trim();
  if (!title || !body) {
    showToast('formToast', 'Titre et corps du rapport requis.', false);
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  const payload = {
    number:       document.getElementById('f_number').value.trim() || undefined,
    title,
    rank:         document.getElementById('f_rank').value,
    date_mission: document.getElementById('f_date').value.trim(),
    duration:     document.getElementById('f_duration').value.trim(),
    lieu:         document.getElementById('f_lieu').value.trim(),
    statut:       document.getElementById('f_statut').value,
    body,
  };

  try {
    const r = await fetch(`${API}/api/reports`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error();
    const created = await r.json();
    showToast('formToast', `✓ Rapport Nº${created.number} enregistré.`, true);
    resetForm();
    await loadReports();
    await checkStatus();
  } catch(e) {
    showToast('formToast', 'Erreur lors de l\'enregistrement.', false);
  } finally {
    btn.disabled = false;
    btn.textContent = '⟡ Enregistrer le Rapport ⟡';
  }
}

async function deleteReport(id) {
  if (!confirm('Supprimer ce rapport définitivement ?')) return;
  try {
    const r = await fetch(`${API}/api/reports/${id}`, { method:'DELETE' });
    if (!r.ok) throw new Error();
    document.getElementById(`ri-${id}`)?.remove();
    // Si liste vide
    const el = document.getElementById('adminList');
    if (!el.querySelector('.report-item')) el.innerHTML = '<div class="empty-list">Aucun rapport</div>';
    await checkStatus();
  } catch(e) {
    alert('Erreur lors de la suppression.');
  }
}

function resetForm() {
  ['f_title','f_date','f_duration','f_lieu','f_body','f_number'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_rank').value   = 'B';
  document.getElementById('f_statut').value = 'Succès';
}

function showToast(id, msg, ok) {
  const t = document.getElementById(id);
  t.textContent = msg;
  t.className = `toast ${ok ? 'ok' : 'err'} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

/* ── Init ── */
(async () => {
  await checkStatus();
  await loadCurrentImage();
  await loadReports();
})();
</script>
</body>
</html>
